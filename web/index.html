<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="fluentish">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>fluentish</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const keyFromUrl = params.get('googleMapsApiKey');
      if (keyFromUrl) {
        window.localStorage.setItem('FLUENTISH_GOOGLE_MAPS_API_KEY', keyFromUrl);
      }

      const apiKey = keyFromUrl ||
        window.localStorage.getItem('FLUENTISH_GOOGLE_MAPS_API_KEY') ||
        '';
      window.fluentishHasGoogleMapsKey = Boolean(apiKey);

      function startFlutter() {
        const flutterScript = document.createElement('script');
        flutterScript.src = 'flutter_bootstrap.js';
        flutterScript.async = true;
        document.body.appendChild(flutterScript);
      }

      if (!apiKey) {
        startFlutter();
        return;
      }

      const mapsScript = document.createElement('script');
      mapsScript.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(apiKey)}`;
      mapsScript.async = true;
      mapsScript.defer = true;
      mapsScript.onload = startFlutter;
      mapsScript.onerror = function () {
        window.fluentishHasGoogleMapsKey = false;
        startFlutter();
      };
      document.head.appendChild(mapsScript);
    })();
  </script>
</body>
</html>
